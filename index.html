<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Handwriting Generator</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Indie+Flower&family=Caveat&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>📝 Handwriting Generator</h1>

    <div class="controls">
      <textarea id="textInput" placeholder="Type your text here..."></textarea>

      <div class="options">
        <label>Select Handwriting Style:</label>
        <select id="fontSelect">
          <option value="Patrick Hand">Patrick Hand</option>
          <option value="Indie Flower">Indie Flower</option>
          <option value="Caveat">Caveat</option>
        </select>
      </div>

      <div class="buttons">
        <button onclick="generateHandwriting()">Generate</button>
        <button onclick="downloadImage()">Download</button>
      </div>
    </div>

    <canvas id="canvas"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
